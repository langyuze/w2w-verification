<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification Request</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .card {
      background: white;
      border-radius: 8px;
      padding: 32px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 { font-size: 1.2rem; margin: 0 0 20px; color: #1a1a1a; }
    #status { font-size: 0.95rem; color: #555; line-height: 1.5; }
    #status.error { color: #c0392b; }
    #status.success { color: #27ae60; }
    #verify-btn {
      display: none;
      margin: 20px auto 0;
      padding: 12px 32px;
      font-size: 1rem;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    #verify-btn:hover { background: #1557b0; }
    #verify-btn:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Verification Request</h1>
    <p id="status">Preparing verification&hellip;</p>
    <button id="verify-btn">Verify</button>
  </div>
  <script>
    const statusEl = document.getElementById('status');
    const verifyBtn = document.getElementById('verify-btn');

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = type || '';
    }

    function base64UrlDecode(str) {
      str = str.replace(/-/g, '+').replace(/_/g, '/');
      while (str.length % 4) str += '=';
      return Uint8Array.from(atob(str), c => c.charCodeAt(0));
    }

    function prepareOptions(options) {
      if (options.digital) {
        return options;
      }
      if (options.publicKey) {
        const pk = options.publicKey;
        if (typeof pk.challenge === 'string') {
          pk.challenge = base64UrlDecode(pk.challenge);
        }
        if (Array.isArray(pk.allowCredentials)) {
          pk.allowCredentials = pk.allowCredentials.map(c => ({
            ...c,
            id: typeof c.id === 'string' ? base64UrlDecode(c.id) : c.id,
          }));
        }
        if (pk.user && typeof pk.user.id === 'string') {
          pk.user.id = base64UrlDecode(pk.user.id);
        }
      }
      return options;
    }

    // Phase 1: fetch and decrypt on page load.
    // Phase 2: call navigator.credentials.get() on button click (requires user gesture).
    let credentialOptions = null;

    (async () => {
      try {
        const requestId = new URLSearchParams(window.location.search).get('requestId');
        const keyB64 = window.location.hash.slice(1);

        if (!requestId) {
          setStatus('Missing requestId parameter.', 'error');
          return;
        }
        if (!keyB64) {
          setStatus('Missing encryption key in URL.', 'error');
          return;
        }

        const keyBytes = base64UrlDecode(keyB64);
        console.log('Key length:', keyBytes.length, 'bytes');
        const cryptoKey = await crypto.subtle.importKey(
          'raw', keyBytes, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
        );
        console.log('Key imported OK');

        setStatus('Fetching verification data…');
        const res = await fetch(
          `/getVerificationRequest?requestId=${encodeURIComponent(requestId)}`,
          { headers: { Accept: 'application/octet-stream' } }
        );
        if (!res.ok) {
          setStatus(`Failed to fetch payload (${res.status}).`, 'error');
          return;
        }

        const rawText = await res.text();
        console.log('Payload from server (base64url):', rawText);
        const encrypted = base64UrlDecode(rawText.trim());
        console.log('Decoded ciphertext length:', encrypted.length, 'bytes');

        if (encrypted.length < 29) {
          setStatus('Payload too short to contain IV + ciphertext + auth tag.', 'error');
          return;
        }
        const iv = encrypted.slice(0, 12);
        const ciphertext = encrypted.slice(12);
        console.log('IV (hex):', Array.from(iv).map(b => b.toString(16).padStart(2,'0')).join(''));
        console.log('Ciphertext (hex):', Array.from(ciphertext).map(b => b.toString(16).padStart(2,'0')).join(''));
        console.log('Ciphertext length:', ciphertext.length, 'bytes');

        setStatus('Decrypting…');
        const plaintext = await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv }, cryptoKey, ciphertext
        );
        const decryptedText = new TextDecoder().decode(plaintext);
        console.log('Decrypted payload:', decryptedText);

        credentialOptions = prepareOptions(JSON.parse(decryptedText));
        console.log('Options ready:', JSON.stringify(credentialOptions, null, 2));

        setStatus('Ready. Click the button to present your credential.');
        verifyBtn.style.display = 'inline-block';
      } catch (err) {
        console.error('Verification error:', err);
        const detail = err.message || err.name || String(err) || '(no details)';
        setStatus(`Error: ${detail}`, 'error');
      }
    })();

    verifyBtn.addEventListener('click', async () => {
      try {
        verifyBtn.disabled = true;
        setStatus('Waiting for credential…');
        console.log('Calling navigator.credentials.get() with:', credentialOptions);
        const credential = await navigator.credentials.get(credentialOptions);
        console.log('Credential received:', credential);
        setStatus('Verification complete.', 'success');
      } catch (err) {
        console.error('Credential error:', err);
        const detail = err.message || err.name || String(err) || '(no details)';
        setStatus(`Error: ${detail}`, 'error');
        verifyBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
