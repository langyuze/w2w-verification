<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verification Request</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .card {
      background: white;
      border-radius: 8px;
      padding: 32px 40px;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 { font-size: 1.2rem; margin: 0 0 20px; color: #1a1a1a; }
    #status { font-size: 0.95rem; color: #555; line-height: 1.5; }
    #status.error { color: #c0392b; }
    #status.success { color: #27ae60; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Verification Request</h1>
    <p id="status">Preparing verification&hellip;</p>
  </div>
  <script>
    const statusEl = document.getElementById('status');

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = type || '';
    }

    function base64UrlDecode(str) {
      str = str.replace(/-/g, '+').replace(/_/g, '/');
      while (str.length % 4) str += '=';
      return Uint8Array.from(atob(str), c => c.charCodeAt(0));
    }

    // Accepts a 64-char hex string (AES-256) or a base64url string.
    function decodeKey(str) {
      if (/^[0-9a-fA-F]{64}$/.test(str)) {
        const bytes = new Uint8Array(32);
        for (let i = 0; i < 32; i++) {
          bytes[i] = parseInt(str.slice(i * 2, i * 2 + 2), 16);
        }
        return bytes;
      }
      return base64UrlDecode(str);
    }

    // Convert base64url strings to Uint8Array for known WebAuthn binary fields.
    function prepareOptions(options) {
      if (options.publicKey) {
        const pk = options.publicKey;
        if (typeof pk.challenge === 'string') {
          pk.challenge = base64UrlDecode(pk.challenge);
        }
        if (Array.isArray(pk.allowCredentials)) {
          pk.allowCredentials = pk.allowCredentials.map(c => ({
            ...c,
            id: typeof c.id === 'string' ? base64UrlDecode(c.id) : c.id,
          }));
        }
        if (pk.user && typeof pk.user.id === 'string') {
          pk.user.id = base64UrlDecode(pk.user.id);
        }
      }
      return options;
    }

    (async () => {
      try {
        const requestId = new URLSearchParams(window.location.search).get('requestId');
        const keyB64 = window.location.hash.slice(1);

        if (!requestId) {
          setStatus('Missing requestId parameter.', 'error');
          return;
        }
        if (!keyB64) {
          setStatus('Missing encryption key in URL.', 'error');
          return;
        }

        // Import the AES-GCM key from the URL fragment (hex or base64url).
        const keyBytes = decodeKey(keyB64);
        console.log('Key bytes length:', keyBytes.length);
        const cryptoKey = await crypto.subtle.importKey(
          'raw', keyBytes, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
        );
        console.log('Key imported OK');

        // Fetch the encrypted payload from the server.
        setStatus('Fetching verification data…');
        const res = await fetch(
          `/getVerificationRequest?requestId=${encodeURIComponent(requestId)}`,
          { headers: { Accept: 'application/octet-stream' } }
        );
        if (!res.ok) {
          setStatus(`Failed to fetch payload (${res.status}).`, 'error');
          return;
        }

        const rawBuf = new Uint8Array(await res.arrayBuffer());
        console.log('Payload bytes length:', rawBuf.length);

        // The payload may be stored as raw binary or as a base64/base64url string.
        // Try raw binary first, then fall back to base64 decoding.
        async function tryDecrypt(bytes) {
          if (bytes.length < 13) throw new Error('Payload too short');
          const iv = bytes.slice(0, 12);
          const ct = bytes.slice(12);
          return crypto.subtle.decrypt({ name: 'AES-GCM', iv }, cryptoKey, ct);
        }

        setStatus('Decrypting…');
        // Log the raw payload as hex for debugging.
        const payloadHex = Array.from(rawBuf).map(b => b.toString(16).padStart(2,'0')).join('');
        console.log('Encrypted payload (hex):', payloadHex);
        console.log('Encrypted payload (text):', new TextDecoder().decode(rawBuf));

        let plaintext;
        try {
          plaintext = await tryDecrypt(rawBuf);
          console.log('Decrypted OK (raw binary)');
        } catch (e1) {
          console.warn('Raw decrypt failed:', e1.name, '— trying base64 decode first');
          try {
            const b64str = new TextDecoder().decode(rawBuf).trim();
            const decoded = base64UrlDecode(b64str);
            console.log('Base64-decoded length:', decoded.length);
            plaintext = await tryDecrypt(decoded);
            console.log('Decrypted OK (base64-encoded payload)');
          } catch (e2) {
            throw new Error(`Decryption failed. Raw: ${e1.name}, Base64: ${e2.name}. Check that the key matches the one used to encrypt.`);
          }
        }
        const decryptedText = new TextDecoder().decode(plaintext);
        console.log('Decrypted payload:', decryptedText);

        // Parse JSON and convert binary fields.
        const options = prepareOptions(JSON.parse(decryptedText));

        // Invoke navigator.credentials.get().
        setStatus('Waiting for credential…');
        console.log('Calling navigator.credentials.get() with:', options);
        await navigator.credentials.get(options);

        setStatus('Verification complete.', 'success');
      } catch (err) {
        console.error('Verification error:', err);
        console.error('name:', err.name, 'message:', err.message, 'str:', String(err));
        const detail = err.message || err.name || String(err) || '(no details)';
        setStatus(`Error: ${detail}`, 'error');
      }
    })();
  </script>
</body>
</html>
